<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciador de Financiamento · VIZIO</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{
  --blue:#1C64F0; --blue-h:#3C94FC; --blue-d:#1450C8; --sky:#5AA0FF; --blue-soft:#E7EFFE;
  --ink:#0E1726; --graphite:#10141F; --graphite2:#1A2030; --graphite3:#27304A;
  --bg:#F3F5F9; --surface:#fff; --text:#161B26; --muted:#667085; --muted2:#98A2B3;
  --border:#E4E8EF; --border2:#EEF1F6; --row:#F7F9FC;
  --success:#16A34A; --success-bg:#E7F6ED; --warn:#D97706; --warn-bg:#FBF1DC;
  --danger:#DC2626; --danger-bg:#FBEAEA; --info:#2563EB; --info-bg:#E8F0FE;
  --radius:12px; --radius-sm:8px; --shadow:0 1px 3px rgba(14,23,38,.06),0 1px 2px rgba(14,23,38,.04);
  --shadow-lg:0 14px 36px rgba(14,23,38,.14);
  --font:'Inter','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
/* ===== LOGIN ===== */
#login{position:fixed;inset:0;background:radial-gradient(120% 120% at 72% 8%,#1A2030 0%,#0B0E16 62%);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{width:100%;max-width:392px;background:var(--surface);border-radius:18px;padding:34px 30px;box-shadow:var(--shadow-lg);text-align:center}
.login-card .lg{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:6px}
.login-card .lg img.sym{height:40px} .login-card .lg img.wm{height:26px}
.login-card h1{font-size:1.12rem;font-weight:800;margin-top:8px}
.login-card .sb{font-size:.82rem;color:var(--muted);margin:3px 0 22px}
.field{text-align:left;margin-bottom:14px}
.field label{display:block;font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.95rem}
.field input:focus{outline:none;border-color:var(--blue)}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:0;padding:12px;border-radius:var(--radius-sm);font-weight:700;font-size:.95rem}
.btn-primary:hover{background:var(--blue-h)}
.login-err{color:var(--danger);font-size:.82rem;margin-bottom:12px;min-height:1em}
.login-hint{margin-top:18px;font-size:.74rem;color:var(--muted2);line-height:1.6;border-top:1px solid var(--border2);padding-top:14px}
.login-hint b{color:var(--muted)}
.login-tag{margin-top:14px;font-size:.7rem;color:var(--muted2);letter-spacing:.02em}
/* ===== SHELL ===== */
#app{display:flex;min-height:100vh}
.side{width:248px;background:var(--graphite);color:#C2C9D6;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex:none}
.side .logo{display:flex;align-items:center;gap:10px;padding:20px 18px 8px}
.side .logo img.sym{height:30px} .side .logo img.wm{height:21px;opacity:.95}
.side .prop{padding:2px 18px 16px;font-size:.7rem;color:var(--sky);font-weight:600;letter-spacing:.02em;border-bottom:1px solid var(--graphite2)}
.nav{flex:1;overflow-y:auto;padding:10px 10px}
.nav .grp{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;padding:14px 10px 6px;font-weight:600;color:#667085}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:8px;color:#C2C9D6;text-decoration:none;font-size:.88rem;font-weight:500;margin-bottom:2px}
.nav a svg{width:18px;height:18px;flex:none;opacity:.85}
.nav a:hover{background:var(--graphite2);color:#fff}
.nav a.active{background:var(--blue);color:#fff}
.nav a.active svg{opacity:1}
.side .foot{padding:14px 16px;border-top:1px solid var(--graphite2);font-size:.7rem;color:#5C6680;display:flex;align-items:center;gap:7px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:20}
.topbar .crumb{font-size:1.05rem;font-weight:700}
.topbar .crumb small{display:block;font-size:.74rem;color:var(--muted);font-weight:500}
.user{display:flex;align-items:center;gap:12px}
.user .who{text-align:right;font-size:.8rem}
.user .who b{display:block;font-weight:600}
.user .who span{color:var(--muted);font-size:.72rem}
.user .av{width:38px;height:38px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
.user button.out{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 9px;color:var(--muted);display:flex}
.user button.out:hover{border-color:var(--danger);color:var(--danger)}
.user button.out svg{width:17px;height:17px}
.content{padding:26px;max-width:1240px;width:100%;margin:0 auto}
/* ===== KPIs / cards ===== */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.kpi.green::before{background:var(--success)} .kpi.warnb::before{background:var(--warn)} .kpi.ink::before{background:var(--graphite2)} .kpi.red::before{background:var(--danger)}
.kpi .lbl{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.kpi .val{font-size:1.7rem;font-weight:800;letter-spacing:-.02em;margin-top:5px}
.kpi .hint{font-size:.76rem;color:var(--muted2);margin-top:3px}
.kpi .hint.up{color:var(--success)} .kpi .hint.dn{color:var(--danger)}
.kpi .pbar{height:6px;border-radius:999px;background:var(--row);margin-top:9px;overflow:hidden}
.kpi .pbar i{display:block;height:100%;border-radius:999px;background:var(--blue)}
.sec-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin:6px 0 12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.card h2{font-size:1.05rem;font-weight:700}
.card .cap{font-size:.82rem;color:var(--muted);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
@media(max-width:980px){.grid2{grid-template-columns:1fr}.side{width:74px}.side .logo img.wm,.side .prop,.nav .grp,.nav a span.t,.side .foot span{display:none}.nav a{justify-content:center}}
.chartbox{position:relative;height:300px}.chartbox.tall{height:380px}.chartbox.xtall{position:relative;height:520px}
.tbl-wrap{overflow-x:auto;max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.86rem}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border2);white-space:nowrap}
th{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--surface);z-index:1}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--row)}
tfoot th{position:sticky;bottom:0;background:var(--surface)}
.badge{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
.badge.pago{background:var(--success-bg);color:var(--success)}
.badge.vencer{background:var(--warn-bg);color:var(--warn)}
.badge.atraso{background:var(--danger-bg);color:var(--danger)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar select,.toolbar input{padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:inherit}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:var(--blue)}
.toolbar label{font-size:.8rem;color:var(--muted);font-weight:600}
.chip{font-size:.78rem;padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-weight:600}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.statlist .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border)}
.statlist .row:last-child{border:0}
.statlist .dot{width:11px;height:11px;border-radius:50%;flex:none}
.statlist .nm{flex:1;font-size:.9rem;font-weight:500}
.statlist .bar{width:120px;height:7px;background:var(--row);border-radius:999px;overflow:hidden}
.statlist .bar i{display:block;height:100%;border-radius:999px}
.statlist .ct{font-weight:700;min-width:90px;text-align:right;font-variant-numeric:tabular-nums}
.insight{background:var(--blue-soft);border:1px solid #C3D9FC;border-radius:var(--radius);padding:14px 16px;font-size:.86rem;color:#13386F;margin-bottom:18px;display:flex;gap:10px}
.insight svg{width:20px;height:20px;flex:none;color:var(--blue-d)}
.sig{margin-top:30px;padding-top:18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:.78rem;color:var(--muted2)}
.sig .by{display:flex;align-items:center;gap:7px}.sig .by b{color:var(--text)}
.sig .by img.sym{height:17px;vertical-align:-4px;opacity:.85}.sig .by img.wm{height:14px;vertical-align:-1px;opacity:.72}
/* ===== Simulador ===== */
.simgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:6px}
.simf label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px}
.simf input{width:100%;padding:10px 12px;border:1.5px solid var(--blue);border-radius:8px;font-size:.95rem;font-family:inherit;font-variant-numeric:tabular-nums}
.simf input:focus{outline:none;border-color:var(--blue-d);box-shadow:0 0 0 3px var(--blue-soft)}
.simres{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
.simres .rc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.simres .rc .l{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
.simres .rc .v{font-size:1.5rem;font-weight:800;margin-top:6px}
.simres .rc.eco{background:#062a18;border-color:#0c6b3a}
.simres .rc.eco .l{color:#7DE3AE}.simres .rc.eco .v{color:#34D399}
@media(max-width:680px){.simres{grid-template-columns:1fr}}
/* ===== HOME PREMIUM (escura, VIZIO) ===== */
body.home{background:#0C0F18}
body.home .topbar{background:#10141F;border-bottom-color:#1E2536}
body.home .topbar .crumb{color:#fff}
body.home .topbar .crumb small{color:#7C86A0}
body.home .topbar .who b{color:#E8EAEE}
body.home .topbar .who span{color:#667085}
body.home .topbar .user button.out{border-color:#283149;color:#8A93A8}
.home-hero{text-align:center;padding:18px 10px 24px}
.home-logo{display:flex;align-items:center;justify-content:center;gap:12px;filter:drop-shadow(0 8px 28px rgba(28,100,240,.38))}
.home-logo img.sym{height:56px}.home-logo img.wm{height:38px}
.home-title{font-size:1.32rem;font-weight:800;letter-spacing:.02em;margin-top:16px;color:#fff}
.home-title span{font-weight:300;color:#7C86A0}
.home-sub{font-size:.84rem;color:#7C86A0;margin-top:3px}
.home-kpis{display:flex;justify-content:center;flex-wrap:wrap;margin-top:22px}
.home-kpis .hk{padding:0 26px;border-right:1px solid #232B40}
.home-kpis .hk:last-child{border-right:0}
.hk-n{font-size:1.45rem;font-weight:800;color:#fff}
.hk-l{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:#667085;margin-top:2px}
.home-insight{display:flex;gap:10px;align-items:flex-start;background:#10243F;border:1px solid #1E4474;border-radius:12px;padding:13px 16px;font-size:.86rem;color:#A8CBF5;margin-bottom:18px}
.home-insight svg{width:20px;height:20px;color:#5AA0FF;flex:none}
.home-insight b{color:#8FBEF8}
.home-sectitle{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:#667085;font-weight:700;margin-bottom:12px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:14px}
.hicon{position:relative;background:#141826;border:1px solid #222a3d;border-radius:16px;padding:22px 10px 16px;text-align:center;cursor:pointer;transition:transform .15s,border-color .15s,background .15s;font-family:inherit}
.hicon:hover{border-color:var(--blue);background:#171D2E;transform:translateY(-2px);z-index:40}
.hicon-ic{color:#5AA0FF;display:flex;justify-content:center}
.hicon-ic svg{width:30px;height:30px}
.hicon-nm{font-size:.8rem;font-weight:600;color:#D2D8E4;margin-top:10px;line-height:1.25}
.hpreview{display:none;position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);width:240px;z-index:40;background:#1A2030;border:1px solid #313B54;border-radius:14px;padding:15px 16px;box-shadow:0 14px 36px rgba(0,0,0,.5);text-align:left}
.hpreview::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#1A2030}
.hicon:hover .hpreview{display:block}
.hp-name{font-size:.95rem;font-weight:700;color:#F1F3F6;margin:7px 0 8px}
.hp-kv{font-size:.8rem;font-weight:600;color:#AEB6C6;margin-top:8px}
.hp-kv b{color:#5AA0FF}
.hp-go{font-size:.72rem;color:#5AA0FF;font-weight:600;margin-top:9px}
.hspark{width:100%;height:32px;display:block}
.hdot{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.hdot::before{content:"";width:7px;height:7px;border-radius:50%}
.hdot.a{color:#34D399}.hdot.a::before{background:#34D399}
.home-foot{text-align:center;padding:24px 0 4px;border-top:1px solid #1E2536;margin-top:24px}
.home-foot .lg{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:9px}
.home-foot .lg img.sym{height:30px}.home-foot .lg img.wm{height:24px;opacity:.95}
.home-foot span{font-size:.72rem;color:#667085}
</style>
</head>
<body>

<div id="login">
  <form class="login-card" onsubmit="return doLogin(event)">
    <div class="lg"><img class="sym" src="vizio-symbol-dark.png" alt="VIZIO"><img class="wm" src="vizio-wordmark-dark.png" alt="VIZIO"></div>
    <h1 id="lgTitle">Gerenciador de Financiamento</h1>
    <div class="sb" id="lgSub">Meu Apê 203 — Dom Pedro I · acesso restrito</div>
    <div class="login-err" id="loginErr"></div>
    <div class="field"><label>Usuário</label><input id="u" autocomplete="username" autofocus></div>
    <div class="field"><label>Senha</label><input id="p" type="password" autocomplete="current-password"></div>
    <button class="btn-primary" type="submit">Entrar</button>
    <div class="login-hint" id="lgHint">Acesso de demonstração:<br><b>sarah</b> / <b>sarah</b> — proprietária<br><b>admin</b> / <b>admin</b> — gestor (Isaac)</div>
    <div class="login-tag">Sua planilha virou software. · um produto INPERSON</div>
  </form>
</div>

<div id="app" class="hidden">
  <aside class="side">
    <div class="logo"><img class="sym" src="vizio-symbol-light.png" alt="VIZIO"><img class="wm" src="vizio-wordmark-light.png" alt="VIZIO"></div>
    <div class="prop" id="sideProp">🏠 Meu Apê 203 — Dom Pedro I</div>
    <nav class="nav" id="nav"></nav>
    <div class="foot"><span id="sideFoot">Gerenciador de Financiamento · v1.0</span></div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="crumb" id="crumb">Início<small id="crumbSub"></small></div>
      <div class="user">
        <div class="who"><b id="uName"></b><span id="uRole"></span></div>
        <div class="av" id="uAv"></div>
        <button class="out" onclick="logout()" title="Sair"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
      </div>
    </header>
    <main class="content" id="view"></main>
  </div>
</div>

<script>
/* ===== Configuração da INSTÂNCIA (lida do dados.js; fallback p/ a 1ª instância) =====
   Para criar a instância de um novo comprador, basta gerar um dados.js com
   DADOS._cfg e DADOS._users (ver o Configurador). Nada mais precisa ser editado. */
const CFG = (typeof DADOS!=='undefined' && DADOS._cfg) ? DADOS._cfg : {};
const PRODUTO   = CFG.produto   || 'Gerenciador de Financiamento';
const INSTANCIA = CFG.instancia || 'Meu Apê 203 — Dom Pedro I';
const PROP_LABEL= CFG.propLabel || 'Proprietária';
const AUTH_URL  = CFG.authUrl   || '';
const USERS = (typeof DADOS!=='undefined' && Array.isArray(DADOS._users) && DADOS._users.length) ? DADOS._users : [
  {user:'sarah',pass:'sarah',nome:'Sarah Nogueira',perfil:'proprietario'},
  {user:'admin',pass:'admin',nome:'Isaac Nogueira',perfil:'admin'}
];
function applyCfg(){
  try{
    document.title = PRODUTO + ' · VIZIO';
    var t=document.getElementById('lgTitle'); if(t) t.textContent=PRODUTO;
    var s=document.getElementById('lgSub');   if(s) s.textContent=INSTANCIA+' · acesso restrito';
    var p=document.getElementById('sideProp');if(p) p.textContent='🏠 '+INSTANCIA;
    var f=document.getElementById('sideFoot');if(f) f.textContent=PRODUTO+' · v1.0';
    var h=document.getElementById('lgHint');
    if(h){
      if(AUTH_URL){ h.innerHTML='Acesso restrito · entre com seu usuário e senha.'; }
      else { h.innerHTML='Acesso de demonstração:<br>'+USERS.map(function(u){return '<b>'+u.user+'</b> / <b>'+(u.pass||'•••')+'</b> — '+(u.perfil==='admin'?'gestor':(u.roleLabel||PROP_LABEL.toLowerCase()));}).join('<br>'); }
    }
  }catch(e){}
}
applyCfg();
let SESSION=null;
try{const s=sessionStorage.getItem('vizio_fin_sess');if(s)SESSION=JSON.parse(s);}catch(e){}
/* ===== Autenticação =====
   AUTH_URL (em DADOS._cfg.authUrl) = URL /exec do Apps Script com auth.
   Se preenchida: o login é validado NO SERVIDOR (senhas ficam hasheadas no
   Sheets, fora do JS público) via SHA-256 + JSONP. Se vazia: modo demonstração
   usando DADOS._users (front-end). AUTH_URL já está definido no bloco de config acima. */
async function sha256hex(s){
  try{ const b=new TextEncoder().encode(s);
    const d=await crypto.subtle.digest('SHA-256',b);
    return Array.from(new Uint8Array(d)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
  catch(e){ return null; }
}
function jsonp(url,cb){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('timeout'));},12000);
    function cleanup(){clearTimeout(t);try{delete window[cb];}catch(e){}s.remove();}
    window[cb]=d=>{cleanup();res(d);};
    s.onerror=()=>{cleanup();rej(new Error('net'));};
    s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cb;
    document.body.appendChild(s);
  });
}
function setSession(s){
  SESSION=s;
  try{sessionStorage.setItem('vizio_fin_sess',JSON.stringify(SESSION));}catch(e){}
  startApp();
}
function doLogin(e){
  e.preventDefault();
  const u=document.getElementById('u').value.trim().toLowerCase();
  const p=document.getElementById('p').value;
  const err=document.getElementById('loginErr');
  if(!AUTH_URL){ // modo demonstração (front-end)
    const f=USERS.find(x=>x.user===u&&x.pass===p);
    if(!f){err.textContent='Usuário ou senha inválidos.';return false;}
    setSession({nome:f.nome,perfil:f.perfil,user:f.user,roleLabel:f.roleLabel});
    return false;
  }
  err.textContent='Verificando…';
  (async()=>{
    try{
      const h=await sha256hex(p);
      if(!h){err.textContent='Navegador sem suporte a criptografia (use HTTPS).';return;}
      const r=await jsonp(AUTH_URL+'?action=login&u='+encodeURIComponent(u)+'&h='+h,'__vzAuth'+Date.now());
      if(r&&r.ok){setSession({nome:r.nome,perfil:r.perfil,user:u,roleLabel:r.roleLabel});}
      else{err.textContent='Usuário ou senha inválidos.';}
    }catch(ex){err.textContent='Falha ao conectar ao servidor de login.';}
  })();

function aggEntrada(){const d=DADOS.entrada;let pago=0,vencer=0,prev=0,nPagos=0,nVencer=0;
  d.forEach(e=>{const v=e.valor||0;prev+=v;if(e.quitado){pago+=(e.pago||e.total||v);nPagos++;}else{vencer+=v;nVencer++;}});
  return {pago,vencer,prev,nPagos,nVencer,n:d.length,pct:pago/(pago+vencer||1)};}
function aggDoc(){const d=DADOS.doc;let pago=0,vencer=0,nPagos=0,nVencer=0;
  d.forEach(e=>{const v=e.total||0;if(e.quitado){pago+=v;nPagos++;}else{vencer+=v;nVencer++;}});
  return {pago,vencer,nPagos,nVencer,n:d.length,pct:pago/(pago+vencer||1)};}
function aggObra(){const d=DADOS.juros;let pago=0,vencer=0,nPagos=0,nVencer=0;
  d.forEach(e=>{const v=e.total||e.valor||0;if(e.quitado){pago+=v;nPagos++;}else{vencer+=v;nVencer++;}});
  const ult=[...d].reverse().find(e=>e.evolucao!=null);
  return {pago,vencer,nPagos,nVencer,n:d.length,pct:pago/(pago+vencer||1),evolucao:ult?ult.evolucao:0};}

function spark(data,type,color){
  data=data.filter(x=>typeof x==='number');if(!data.length)data=[0];
  const w=200,h=32,mx=Math.max.apply(null,data.concat([1])),mn=Math.min.apply(null,data);
  let inner='';color=color||'#5AA0FF';
  if(type==='bar'){const bw=w/data.length;data.forEach((vv,i)=>{const bh=Math.max(2,(vv/mx)*(h-3));inner+=`<rect x="${(i*bw+1).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${Math.max(1,bw-2.5).toFixed(1)}" height="${bh.toFixed(1)}" rx="1.4" fill="${color}" opacity="${(0.42+0.58*vv/mx).toFixed(2)}"/>`;});}
  else{const pts=data.map((vv,i)=>`${(i/((data.length-1)||1)*w).toFixed(1)},${(h-2-((vv-mn)/((mx-mn)||1))*(h-5)).toFixed(1)}`);inner=`<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2"/>`;}
  return `<svg class="hspark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${inner}</svg>`;
}

  if(id==='doc'){const a=aggDoc();return `<b>${fmtBRL(a.pago)}</b> pagos · ${fmtPct(a.pct)}`;}
  if(id==='obra'){const a=aggObra();return `obra <b>${fmtPct(a.evolucao)}</b> · ${fmtPct(a.pct)} pago`;}
  if(id==='financiamento')return `Saldo <b>${fmtBRL(DADOS.finMeta.saldoAtual)}</b> · 420x`;

      <div class="kpi" style="--blue:#5AA0FF"><div class="lbl">Evolução da obra</div><div class="val">${fmtPct(a.evolucao)}</div><div class="pbar"><i style="width:${(a.evolucao*100).toFixed(1)}%;background:#5AA0FF"></i></div></div>
      <div class="kpi ink"><div class="lbl">Concluído (pago)</div><div class="val">${fmtPct(a.pct)}</div><div class="pbar"><i style="width:${(a.pct*100).toFixed(1)}%"></i></div></div>
    </div>
    <div class="card"><h2>Juros de obra × evolução da construção</h2><div class="cap">O juro de obra acompanha o avanço físico da obra. Barra = valor pago no mês · linha = % da obra concluída.</div><div class="chartbox tall"><canvas id="cObra"></canvas></div></div>
    <div class="card"><h2>Detalhe mensal</h2>
      <div class="tbl-wrap"><table><thead><tr><th>Parcela</th><th>Vencimento</th><th class="num">Valor</th><th class="num">Evolução obra</th><th>Status</th></tr></thead><tbody id="tbObra"></tbody></table></div></div>${sig()}`;
  if(chO)chO.destroy();
  chO=new Chart(document.getElementById('cObra'),{data:{labels:d.map(e=>e.parcela),datasets:[
    {type:'bar',label:'Valor (R$)',data:d.map(e=>e.valor||0),backgroundColor:'#1C64F0',borderRadius:4,yAxisID:'y',maxBarThickness:22},
    {type:'line',label:'Evolução da obra',data:d.map(e=>e.evolucao!=null?e.evolucao*100:null),borderColor:'#16A34A',backgroundColor:'#16A34A',tension:.3,borderWidth:2.5,pointRadius:0,yAxisID:'y1',spanGaps:true}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8,font:{family:'Inter'}}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='y'?c.dataset.label+': '+fmtBRL2(c.parsed.y):'Obra: '+c.parsed.y.toFixed(1)+'%'}}},scales:{y:{ticks:{callback:x=>'R$'+x,font:{family:'Inter'}},grid:{color:'#EEF1F6'}},y1:{position:'right',min:0,max:100,ticks:{callback:x=>x+'%',font:{family:'Inter'}},grid:{drawOnChartArea:false}},x:{grid:{display:false},ticks:{font:{family:'Inter'}}}}}});
  document.getElementById('tbObra').innerHTML=d.map(e=>{
    const cls=e.quitado?'pago':'vencer';const st=e.quitado?'PAGO':'A VENCER';
    return `<tr><td><b>${e.parcela}</b></td><td>${dBR(e.venc)}</td><td class="num">${fmtBRL2(e.valor)}</td><td class="num">${e.evolucao!=null?fmtPct(e.evolucao):'—'}</td><td><span class="badge ${cls}">${st}</span></td></tr>`;
  }).join('');
}
/* ---------- FINANCIAMENTO ---------- */
function renderFin(v){
  const fm=DADOS.finMeta,d=DADOS.fin;
  const pagas=d.filter(x=>x.quitado).length,rest=d.length-pagas;
  const totalContrato=d.reduce((s,x)=>s+(x.valor||0),0);
  const jurosTotal=totalContrato-fm.saldoInicial;
  v.innerHTML=`
    <div class="kpis">
      <div class="kpi red"><div class="lbl">Saldo devedor atual</div><div class="val">${fmtBRL(fm.saldoAtual)}</div><div class="hint">${rest} parcelas restantes</div></div>
      <div class="kpi ink"><div class="lbl">Valor financiado</div><div class="val">${fmtBRL(fm.saldoInicial)}</div><div class="hint">SAC · ${d.length} parcelas</div></div>
      <div class="kpi warnb"><div class="lbl">Juros do contrato</div><div class="val">${fmtBRL(jurosTotal)}</div><div class="hint">a ${(fm.jurosMensal*100).toFixed(2).replace('.',',')}% a.m. (≈${((Math.pow(1+fm.jurosMensal,12)-1)*100).toFixed(1).replace('.',',')}% a.a.)</div></div>
      <div class="kpi green"><div class="lbl">Quitado</div><div class="val">${fmtPct(fm.pctQuitado)}</div><div class="pbar"><i style="width:${Math.max(1,fm.pctQuitado*100).toFixed(1)}%;background:#16A34A"></i></div></div>
    </div>
    <div class="insight">${svg('simulador')}<div>No sistema <b>SAC</b>, a parcela começa mais alta e cai ao longo do tempo, porque a amortização é fixa e os juros diminuem junto com o saldo. Um aporte mensal extra encurta muito o prazo — teste no <b>Simulador</b>.</div></div>
    <div class="card"><h2>Evolução do saldo devedor</h2><div class="cap">Projeção da dívida ao banco até a quitação (${d[0]?dBR(d[0].mes):''} → ${d[d.length-1]?dBR(d[d.length-1].mes):''}).</div><div class="chartbox tall"><canvas id="cFin"></canvas></div></div>
    <div class="card"><h2>Tabela de amortização</h2>
      <div class="toolbar"><label>Mostrar:</label><select id="selFin" onchange="fillFin()"><option value="60">Primeiras 60</option><option value="120">Primeiras 120</option><option value="all">Todas (420)</option></select><input id="bFin" placeholder="Buscar nº parcela..." oninput="fillFin()" style="flex:1;min-width:150px"></div>
      <div class="tbl-wrap"><table><thead><tr><th>Parcela</th><th>Mês</th><th class="num">Parcela (R$)</th><th class="num">Amortização</th><th class="num">Saldo devedor</th><th>Status</th></tr></thead><tbody id="tbFin"></tbody></table></div></div>${sig()}`;
  if(chF)chF.destroy();
  const samp=d.filter((_,i)=>i%6===0||i===d.length-1);
  chF=new Chart(document.getElementById('cFin'),{type:'line',data:{labels:samp.map(e=>dBR(e.mes).slice(3)),datasets:[{label:'Saldo devedor',data:samp.map(e=>e.saldo||0),borderColor:'#DC2626',backgroundColor:'rgba(220,38,38,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmtBRL(c.parsed.y)}}},scales:{y:{ticks:{callback:x=>'R$ '+(x/1000).toFixed(0)+'k',font:{family:'Inter'}},grid:{color:'#EEF1F6'}},x:{grid:{display:false},ticks:{maxTicksLimit:14,font:{family:'Inter',size:10}}}}}});
  fillFin();
}
function fillFin(){
  const lim=document.getElementById('selFin').value;const q=(document.getElementById('bFin').value||'').trim();
  let rows=DADOS.fin;
  if(q)rows=rows.filter(e=>String(e.parcela).includes(q));
  else if(lim!=='all')rows=rows.slice(0,+lim);
  document.getElementById('tbFin').innerHTML=rows.map(e=>{
    const cls=e.quitado?'pago':'vencer';const st=e.quitado?'PAGO':'A VENCER';
    return `<tr><td><b>${e.parcela}</b></td><td>${dBR(e.mes)}</td><td class="num">${fmtBRL2(e.valor)}</td><td class="num">${fmtBRL2(e.amort)}</td><td class="num">${fmtBRL2(e.saldo)}</td><td><span class="badge ${cls}">${st}</span></td></tr>`;
  }).join('')||'<tr><td colspan="6" style="color:var(--muted)">Nada encontrado.</td></tr>';
}
/* ---------- SIMULADOR ---------- */
function simulate(saldo,taxa,parcela,aporteExtra,aporteUnico){
  let s=saldo-(aporteUnico||0),juros=0,meses=0,desemb=(aporteUnico||0);
  const pay=parcela+(aporteExtra||0);
  if(pay<=s*taxa)return {meses:Infinity,juros:Infinity,desemb:Infinity}; // nunca amortiza
  while(s>0.005&&meses<5000){
    const j=s*taxa;juros+=j;
    let principal=pay-j;
    let realPay=pay;
    if(principal>s){realPay=s+j;principal=s;}
    s-=principal;desemb+=realPay;meses++;
  }
  return {meses,juros,desemb};
}
function renderSim(v){
  const sm=DADOS.sim;
  v.innerHTML=`
    <div class="card"><h2>Simulador de amortização antecipada</h2><div class="cap">Edite os campos em azul. O modelo: parcela fixa mensal + juros sobre o saldo devedor (aproximação do contrato).</div>
      <div class="simgrid">
        <div class="simf"><label>Saldo devedor (R$)</label><input id="sSaldo" type="number" value="${sm.saldo}" oninput="runSim()"></div>
        <div class="simf"><label>Juros mensal (%)</label><input id="sJuros" type="number" step="0.01" value="${(sm.juros*100).toFixed(2)}" oninput="runSim()"></div>
        <div class="simf"><label>Parcela base (R$)</label><input id="sParc" type="number" value="${sm.parcela}" oninput="runSim()"></div>
        <div class="simf"><label>Aporte extra mensal (R$)</label><input id="sExtra" type="number" value="${sm.aporteExtra}" oninput="runSim()"></div>
        <div class="simf"><label>Aporte único agora (R$)</label><input id="sUnico" type="number" value="${sm.aporteUnico}" oninput="runSim()"></div>
      </div>
    </div>
    <div class="simres" id="simRes"></div>
    <div class="card"><h2>Saldo devedor: sem aporte × com aporte</h2><div class="cap">Veja em quanto tempo a dívida zera nos dois cenários.</div><div class="chartbox tall"><canvas id="cSim"></canvas></div></div>${sig()}`;
  runSim();
}
function runSim(){
  const saldo=+document.getElementById('sSaldo').value||0;
  const taxa=(+document.getElementById('sJuros').value||0)/100;
  const parc=+document.getElementById('sParc').value||0;
  const extra=+document.getElementById('sExtra').value||0;
  const unico=+document.getElementById('sUnico').value||0;
  const base=simulate(saldo,taxa,parc,0,0);
  const sim=simulate(saldo,taxa,parc,extra,unico);
  const okBase=isFinite(base.meses),okSim=isFinite(sim.meses);
  const ecoMeses=okBase&&okSim?base.meses-sim.meses:0;
  const ecoJuros=okBase&&okSim?base.juros-sim.juros:0;
  const fa=v=>isFinite(v)?v:'∞';
  document.getElementById('simRes').innerHTML=`
    <div class="rc"><div class="l">Sem aporte</div><div class="v">${fa(base.meses)} <span style="font-size:.8rem;font-weight:600;color:var(--muted)">meses</span></div><div class="hint" style="font-size:.74rem;color:var(--muted)">Juros: ${okBase?fmtBRL(base.juros):'—'}</div></div>
    <div class="rc"><div class="l">Com aporte</div><div class="v">${fa(sim.meses)} <span style="font-size:.8rem;font-weight:600;color:var(--muted)">meses</span></div><div class="hint" style="font-size:.74rem;color:var(--muted)">Juros: ${okSim?fmtBRL(sim.juros):'—'}</div></div>
    <div class="rc eco"><div class="l">Você economiza</div><div class="v">${fmtBRL(ecoJuros)}</div><div class="hint" style="font-size:.74rem;color:#7DE3AE">${ecoMeses>0?'− '+ecoMeses+' meses ('+(ecoMeses/12).toFixed(1).replace('.',',')+' anos)':'—'}</div></div>`;
  // curvas de saldo
  function curve(extraV,unicoV){let s=saldo-(unicoV||0),pts=[s],i=0;const pay=parc+(extraV||0);while(s>0.005&&i<5000){const j=s*taxa;let pr=pay-j;if(pr<=0)break;if(pr>s)pr=s;s-=pr;pts.push(Math.max(0,s));i++;}return pts;}
  const cb=curve(0,0),cs=curve(extra,unico);
  const maxLen=Math.max(cb.length,cs.length);
  const labels=Array.from({length:maxLen},(_,i)=>i);
  if(chS)chS.destroy();
  chS=new Chart(document.getElementById('cSim'),{type:'line',data:{labels,datasets:[
    {label:'Sem aporte',data:cb,borderColor:'#98A2B3',backgroundColor:'rgba(152,162,179,.08)',fill:false,tension:.2,pointRadius:0,borderWidth:2},
    {label:'Com aporte',data:cs,borderColor:'#1C64F0',backgroundColor:'rgba(28,100,240,.10)',fill:true,tension:.2,pointRadius:0,borderWidth:2.5}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,boxWidth:8,font:{family:'Inter'}}},tooltip:{callbacks:{title:c=>'Mês '+c[0].label,label:c=>c.dataset.label+': '+fmtBRL(c.parsed.y)}}},scales:{y:{ticks:{callback:x=>'R$ '+(x/1000).toFixed(0)+'k',font:{family:'Inter'}},grid:{color:'#EEF1F6'},min:0},x:{grid:{display:false},title:{display:true,text:'meses',font:{family:'Inter',size:10}},ticks:{maxTicksLimit:14,font:{family:'Inter',size:10}}}}}});
}

if(SESSION)startApp();
</script>
